
name: Deployment to Azure

on: 
  push: 
    branches: 
      - main
  workflow_dispatch:

env: 
  FRONTEND_IMAGE: talhaashfaq4/inventoryflow:frontend-${{ github.sha }}
  BACKEND_IMAGE: talhaashfaq4/inventoryflow:backend-${{ github.sha }}


jobs: 

  build-images:
    runs-on: ubuntu-latest

    steps: 
      - name: Checkout Code
        uses: actions/checkout@v4 

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Building & Pushing Frontend 
        run: | 
          docker build -t $FRONTEND_IMAGE ./frontend
          docker push $FRONTEND_IMAGE

      - name: Building & Pushing Backend
        run: |
          docker build -t $BACKEND_IMAGE ./backend
          docker push -t $BACKEND_IMAGE 

  deploy-frontend:
    runs-on: ubuntu-latest
    needs: build-images

    steps: 
      - name: Deploying Frontend
        uses: azure/webapps-deploy@v2
        with: 
          app-name: inventoryflow
          publish-profile: ${{ secrets.AZURE_FRONTEND_PUBLISH_PROFILE }}
          images: ${{ env.FRONTEND_IMAGE }}

  deploy-backend: 
    runs-on: ununtu-latest
    needs: build-images

    steps:
      - name: Deploy Backend
        uses: azure/webapps-deploy@v2
        with:
          app-name: inventoryflowbackend  
          publish-profile: ${{ secrets.AZURE_BACKEND_PUBLISH_PROFILE }}
          images: ${{ env.BACKEND_IMAGE }}




