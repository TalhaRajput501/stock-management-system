
services: 
  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile.local
    image: talhaashfaq4/inventoryflow:frontend-latest
    env_file: ./frontend/.env
    ports: 
      - 8080:80

  backend:
    build: ./backend
    image: talhaashfaq4/inventoryflow:backend-latest
    env_file: ./backend/.env
    ports:
      - 3000:3000

